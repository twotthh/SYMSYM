<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SYMSYM Dashboard</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Malgun Gothic', sans-serif;
            background: #fbf9f6;
            color: #4E0A0B;
        }

        header {
            background: #4E0A0B;
            color: #F2EEE8;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(78, 10, 11, 0.2);
        }
        
        header h1 { margin: 0; font-size: 24px; }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(78, 10, 11, 0.05);
        }

        .search-box input {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            border: 2px solid rgba(78, 10, 11, 0.1);
            border-radius: 8px;
            color: #4E0A0B;
            outline: none;
        }

        .search-box input:focus { border-color: #E38792; }

        .search-box button {
            padding: 0 30px;
            font-size: 16px;
            font-weight: bold;
            background: #E38792; /* cotton candy */
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .search-box button:hover { background: #c96b77; }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(78, 10, 11, 0.05);
            text-align: center;
            border-top: 5px solid #4E0A0B;
        }

        .stat-card h3 { margin: 0 0 10px 0; color: #666; font-size: 16px; }
        .stat-card .number { font-size: 36px; font-weight: bold; color: #4E0A0B; }

        .detail-section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(78, 10, 11, 0.05);
        }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(78, 10, 11, 0.1); }
        th { background: #F2EEE8; color: #4E0A0B; font-weight: bold; }
        
        .CRITICAL { color: white; background: #4E0A0B; padding: 4px 10px; border-radius: 4px; font-size: 12px; }
        .HIGH { color: white; background: #E38792; padding: 4px 10px; border-radius: 4px; font-size: 12px; }
        .SAFE { color: white; background: #9DAD71; padding: 4px 10px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>

    <header>
        <h1>SYMSYM Dashboard</h1>
        <span>실시간 위협 모니터링 시스템</span>
    </header>

    <div class="container">
        <div class="search-box">
            <input type="text" id="targetInput" placeholder="이메일 또는 도메인을 입력하세요 (ex: example@gmail.com)">
            <button id="analyzeBtn">딥스캔 분석</button>
        </div>

        <div id="loading" style="display: none; text-align: center; margin: 50px 0; font-weight: bold;">
            AWS DynamoDB에서 실시간 위협 데이터를 분석 중
        </div>

        <div id="dashboard-content" style="display: none;">
            <div class="summary-cards">
                <div class="stat-card">
                    <h3>총 발견된 위협 (건)</h3>
                    <div class="number" id="totalCount">0</div>
                </div>
                <div class="stat-card" style="border-top-color: #E38792;">
                    <h3>위험도 (High 이상)</h3>
                    <div class="number" id="highCount" style="color: #E38792;">0</div>
                </div>
                <div class="stat-card" style="border-top-color: #9DAD71;">
                    <h3>안전 상태</h3>
                    <div class="number" id="statusText" style="color: #9DAD71; font-size: 24px; padding-top: 10px;">분석 완료</div>
                </div>
            </div>

            <div class="detail-section">
                <h2>유출 상세 내역</h2>
                <table>
                    <thead>
                        <tr>
                            <th>위험도</th>
                            <th>출처</th>
                            <th>유출/취약점 상세 내용</th>
                        </tr>
                    </thead>
                    <tbody id="resultBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
