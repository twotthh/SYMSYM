<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYMSYM</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
    :root {
    --bg: #FAF6F1;
    --surface: #FFFFFF;
    --line: #ECE1D5;
    --ink: #241A15;
    --mist: #93807A;
    --mist-soft: #CDBEB4;

    --brand: #B5432A;
    --brand-hover: #9A3620;
    --mint: #A9791F;
    --amber: #D97B2E;

    --font: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    }
  * { box-sizing:border-box; }
    html,body { margin:0; padding:0; }
    body {
    width: 360px;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
    }
    a { color:inherit; text-decoration:none; }
    :focus-visible { outline: 2.5px solid var(--brand); outline-offset: 2px; border-radius: 6px; }

    .popup-topbar {
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 16px 18px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    }
    .brand {
    display:flex;
    align-items:center;
    gap:8px;
    font-weight: 800;
    font-size: 16px;
    letter-spacing: -0.01em;
    }
    
    .logout {
    font-size: 12px;
    font-weight: 600;
    color: var(--mist);
    padding: 6px 10px;
    border: 1px solid var(--line);
    border-radius: 8px;
    transition: border-color .15s ease, color .15s ease;
    cursor: pointer;
    }

    .logout:hover { border-color: var(--brand); color: var(--brand); }

    .popup-body { padding: 16px 18px 18px; display:flex; flex-direction:column; }

    .scan-row {
    display:flex;
    align-items:center;
    gap: 8px;
    background: var(--surface);
    border: 1.5px solid var(--line);
    border-radius: 12px;
    padding: 4px 4px 4px 13px;
    transition: border-color .15s ease;
    margin-bottom: 12px; 
    }
    .scan-row:focus-within { border-color: var(--brand); }
    .scan-row input {
    flex:1;
    background: transparent;
    border:none;
    color: var(--ink);
    font-family: var(--font);
    font-weight: 500;
    font-size: 12.5px;
    padding: 11px 0;
    min-width: 0;
    }
    .scan-row input::placeholder { color: var(--mist-soft); }
    .scan-row input:focus { outline:none; }
    .scan-row button {
    background: var(--brand);
    color: #fff;
    border:none;
    font-family: var(--font);
    font-weight:700;
    font-size: 12.5px;
    padding: 10px 14px;
    border-radius: 8px;
    cursor:pointer;
    transition: background .15s ease;
    white-space: nowrap;
    }
    .scan-row button:hover { background: var(--brand-hover); }

    .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 13px 15px;
    margin-bottom: 12px;
    }
    .card-label {
    font-size: 11.5px;
    font-weight: 700;
    color: var(--mist);
    display:flex;
    align-items:center;
    gap:7px;
    margin-bottom: 7px;
    }
    .dot {
    width:6px; height:6px;
    border-radius:50%;
    background: var(--mint);
    box-shadow: 0 0 0 0 rgba(169,121,31,0.5);
    animation: pulse 2.2s infinite;
    flex-shrink:0;
    }
    @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(169,121,31,0.5); }
    70% { box-shadow: 0 0 0 6px rgba(169,121,31,0); }
    100% { box-shadow: 0 0 0 0 rgba(169,121,31,0); }
    }
    @media (prefers-reduced-motion: reduce) { .dot{ animation:none; } }

    .card-main { font-size: 13.5px; font-weight:700; color: var(--ink); }
    .card.status .card-main { color: var(--mint); }

    .card.results .card-main {
    font-weight: 500;
    color: var(--mist);
    font-size: 12.5px;
    line-height:1.5;
    }
    .card.results { min-height: 70px; display:flex; flex-direction:column; justify-content:center; }

    .CRITICAL { color: var(--brand); font-weight: 700; }
    .HIGH { color: var(--amber); font-weight: 700; }
    .MEDIUM { color: var(--mint); font-weight: 700; }
    .LOW { color: var(--mist); font-weight: 700; }
    
    .threat-item { 
        border-bottom: 1px solid var(--line); 
        padding-bottom: 8px; 
        margin-bottom: 8px; 
    }
    .threat-item:last-child { 
        border-bottom: none; 
        padding-bottom: 0; 
        margin-bottom: 0; 
    }

    .dash-btn {
    display:flex;
    align-items:center;
    justify-content:center;
    gap:7px;
    background: var(--ink);
    color: #fff;
    font-family: var(--font);
    font-weight:700;
    font-size: 13.5px;
    padding: 13px;
    border-radius: 10px;
    cursor:pointer;
    border:none;
    width:100%;
    transition: opacity .15s ease;
    }
    .dash-btn:hover { opacity:.85; }

    .btn-secondary {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--ink);
    margin-top: 6px;
    }
    .btn-secondary:hover { background: var(--bg); opacity: 1; }

</style>
</head>
<body>

    <div class="popup-topbar">
    <div class="brand">SYMSYM</div>
    <a class="logout" id="logoutBtn" style="display: none;">로그아웃</a>
    </div>

    <div class="popup-body">

    <div id="auth-section">
        <div class="card">
        <div class="card-main" style="margin-bottom: 6px;">환영합니다!</div>
        <div class="card-label" style="margin-bottom: 16px;">서비스를 이용하려면 로그인해주세요.</div>
        
        <div style="display: flex; flex-direction: column; gap: 8px;">
            <div class="scan-row" style="padding: 0 13px; margin-bottom: 0;">
        <input type="email" id="authEmail" placeholder="이메일 입력">
            </div>
            <div class="scan-row" style="padding: 0 13px; margin-bottom: 0;">
            <input type="password" id="authPassword" placeholder="비밀번호 입력">
            </div>
            <button id="loginBtn" class="dash-btn" style="margin-top: 6px;">로그인</button>
            <button id="registerBtn" class="dash-btn btn-secondary">회원가입</button>
        </div>
        <div id="authMessage" style="color: var(--brand); font-size: 12px; margin-top: 10px; text-align: center; font-weight: 600;"></div>
    </div>
    </div>

    <div id="main-section" style="display: none;">
        <div class="scan-row">
        <input type="email" id="emailInput" placeholder="도메인/이메일/전화번호 입력">
        <button id="scanBtn">조회</button>
        </div>

    <div class="card status">
        <div class="card-label"><span class="dot"></span>모니터링 상태</div>
        <div class="card-main">정상 작동 중</div>
    </div>

    <div class="card results">
        <div class="card-label">실시간 모니터링 결과</div>
        <div class="card-main" id="result-box">도메인/이메일/전화번호 을 입력하고 조회를 눌러주세요.</div>
    </div>

    <button class="dash-btn" id="dashboardBtn">대시보드 보기 →</button>
    </div>
</div>

<script src="popup.js"></script>
</body>
</html>
