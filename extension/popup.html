<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SYMSYM Security Alert</title>

    <style>
        body{
            width:320px;
            padding:15px;
            font-family:"Malgun Gothic",sans-serif;
            background:#f8f9fa;
        }

        h2{
            color:#d32f2f;
            margin:0 0 15px 0;
        }

        .card{
            background:white;
            border-radius:10px;
            padding:12px;
            margin-bottom:10px;
            box-shadow:0 2px 5px rgba(0,0,0,0.08);
        }

        .status{
            color:#2e7d32;
            font-weight:bold;
        }

        .warning{
            color:#d32f2f;
            font-weight:bold;
        }

        button{
            width:100%;
            padding:10px;
            border:none;
            border-radius:8px;
            background:#1976d2;
            color:white;
            cursor:pointer;
            font-size:14px;
        }

        button:hover{
            background:#1565c0;
        }
    </style>

</head>

<body>

<h2>🛡️ SYMSYM</h2>

<div class="card">
    <b>모니터링 상태</b><br>
    <span class="status">정상 작동 중</span>
</div>

<div class="card">
    <b>최근 검사</b><br>
    오늘 14:30
</div>

<div class="card">
    <b>최근 위협</b><br>
    <span class="warning">없음</span>
</div>

<button>대시보드 보기</button>

</body>
</html>
